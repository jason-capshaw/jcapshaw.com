<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jason Capshaw — Systems thinking for B2B distribution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   jcapshaw.com — dark editorial journal
   ============================================================ */

:root {
  /* Palette — warm black, paper-white, muted accent */
  --bg: #0a0908;
  --bg-elev: #111110;
  --ink: #e8e4dc;
  --ink-dim: #a39e93;
  --ink-faint: #6b6660;
  --rule: #232220;
  --rule-strong: #3a3834;
  --accent: #c8a75e;          /* aged brass */
  --accent-soft: #8a7645;
  --hl: rgba(200, 167, 94, 0.12);

  /* Type */
  --serif: "Spectral", "Source Serif Pro", "Iowan Old Style", Georgia, serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: "Inter Tight", "Söhne", -apple-system, system-ui, sans-serif;

  /* Scale */
  --col: 640px;
  --col-wide: 880px;
  --pad-x: clamp(24px, 5vw, 56px);

  /* Density */
  --rhythm: 1.75rem;
}

[data-theme="light"] {
  --bg: #f4f0e8;
  --bg-elev: #ebe6dc;
  --ink: #1a1918;
  --ink-dim: #5a544c;
  --ink-faint: #928b80;
  --rule: #d6cfc2;
  --rule-strong: #b8b0a1;
  --accent: #8a6a1f;
  --accent-soft: #a88a3a;
  --hl: rgba(138, 106, 31, 0.1);
}

[data-density="compact"] { --rhythm: 1.25rem; }
[data-density="spacious"] { --rhythm: 2.25rem; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

html {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.6;
  font-feature-settings: "kern", "liga", "onum";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200, 167, 94, 0.035), transparent 60%),
    var(--bg);
  transition: background-color 240ms ease, color 240ms ease;
}

/* ---------- Typographic primitives ---------- */

.display {
  font-family: var(--serif);
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.12;
}

.label {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.meta {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--ink-faint);
  font-variant-numeric: tabular-nums;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

a { color: inherit; text-decoration: none; }
a.link {
  background-image: linear-gradient(var(--accent), var(--accent));
  background-size: 100% 1px;
  background-repeat: no-repeat;
  background-position: 0 100%;
  padding-bottom: 1px;
  transition: color 160ms ease;
}
a.link:hover { color: var(--accent); }

hr.rule {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: 0;
}

/* ---------- Layout scaffolding ---------- */

.shell {
  max-width: var(--col-wide);
  margin: 0 auto;
  padding: 0 var(--pad-x);
}

.shell.narrow {
  max-width: var(--col);
}

/* ---------- Top bar ---------- */

.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: color-mix(in oklab, var(--bg) 88%, transparent);
  backdrop-filter: blur(14px) saturate(130%);
  -webkit-backdrop-filter: blur(14px) saturate(130%);
  border-bottom: 1px solid var(--rule);
}

.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px var(--pad-x);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
  line-height: 1;
}
.brand .name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.brand .sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.nav {
  display: flex;
  gap: 28px;
  justify-content: center;
  align-items: center;
}
.nav a {
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.08em;
  color: var(--ink-dim);
  transition: color 140ms ease;
  position: relative;
  padding: 4px 0;
}
.nav a::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 1px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 200ms ease;
}
.nav a:hover { color: var(--ink); }
.nav a:hover::after,
.nav a.active::after { transform: scaleX(1); }
.nav a.active { color: var(--ink); }

.topbar-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-dim);
  width: 30px;
  height: 30px;
  border-radius: 2px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 160ms ease;
  font-family: var(--mono);
  font-size: 12px;
}
.icon-btn:hover {
  border-color: var(--rule-strong);
  color: var(--ink);
}

/* ---------- Hover preview card ---------- */
.hover-preview {
  position: fixed;
  z-index: 100;
  width: 320px;
  padding: 14px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--rule-strong);
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 160ms ease, transform 160ms ease;
  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
}
.hover-preview.show { opacity: 1; transform: translateY(0); }
.hover-preview .title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.hover-preview .excerpt {
  font-family: var(--serif);
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink-dim);
  margin-bottom: 10px;
}
.hover-preview .foot {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: flex;
  justify-content: space-between;
}

/* ---------- Hero ---------- */

.hero {
  padding: clamp(80px, 14vh, 160px) 0 clamp(60px, 10vh, 120px);
  text-align: center;
}
.hero h1 {
  font-size: clamp(30px, 4.2vw, 44px);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
  max-width: 18ch;
  margin: 0 auto 22px;
}
.hero .sub {
  max-width: 52ch;
  margin: 0 auto;
  font-size: 15.5px;
  line-height: 1.6;
  color: var(--ink-dim);
}
.hero .ornament {
  margin: 48px auto 0;
  width: 28px;
  height: 1px;
  background: var(--rule-strong);
  position: relative;
}
.hero .ornament::before,
.hero .ornament::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 3px;
  height: 3px;
  background: var(--accent);
  border-radius: 50%;
  transform: translateY(-50%);
}
.hero .ornament::before { left: -12px; }
.hero .ornament::after { right: -12px; }

/* ---------- Featured post ---------- */

.featured {
  padding: clamp(40px, 8vh, 80px) 0;
  text-align: center;
}
.featured .kicker {
  margin-bottom: 20px;
}
.featured h2 {
  font-size: clamp(24px, 3vw, 32px);
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.2;
  max-width: 22ch;
  margin: 0 auto 20px;
}
.featured p {
  max-width: 52ch;
  margin: 0 auto 18px;
  color: var(--ink-dim);
  font-size: 15px;
  line-height: 1.65;
}

/* ---------- Section header ---------- */

.section {
  padding: clamp(64px, 10vh, 112px) 0 clamp(24px, 4vh, 48px);
}
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 8px;
}
.section-head h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0;
}
.section-head .link-all {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  transition: color 140ms ease;
}
.section-head .link-all:hover { color: var(--accent); }

/* ---------- Post list ---------- */

.post-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  padding: calc(var(--rhythm) * 0.8) 0;
  border-bottom: 1px solid var(--rule);
  transition: background 160ms ease;
  position: relative;
}
.post-row::before {
  content: "";
  position: absolute;
  left: -16px; right: -16px; top: 0; bottom: 0;
  background: var(--hl);
  opacity: 0;
  transition: opacity 160ms ease;
  pointer-events: none;
}
.post-row:hover::before { opacity: 1; }
.post-row .pr-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  position: relative;
}
.post-row .pr-excerpt {
  font-family: var(--serif);
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-dim);
  max-width: 60ch;
  position: relative;
}
.post-row .pr-meta {
  text-align: right;
  white-space: nowrap;
  position: relative;
  padding-top: 4px;
}
.post-row .pr-meta .tag {
  display: block;
  margin-bottom: 2px;
  color: var(--ink-faint);
}

/* ---------- Topic grid ---------- */

.topic-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-top: 24px;
}
.topic {
  background: var(--bg);
  padding: 28px 28px 32px;
  transition: background 160ms ease;
  cursor: default;
}
.topic:hover { background: var(--bg-elev); }
.topic .t-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.topic .t-desc {
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink-dim);
  margin-bottom: 14px;
}
.topic .t-count {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

/* ---------- Footer ---------- */

footer.footer {
  margin-top: clamp(80px, 14vh, 160px);
  padding: 48px 0 64px;
  border-top: 1px solid var(--rule);
}
.footer-inner {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
  align-items: start;
}
.footer h4 {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0 0 14px;
}
.footer a, .footer p {
  display: block;
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-dim);
  margin-bottom: 6px;
  line-height: 1.55;
}
.footer a:hover { color: var(--accent); }
.footer .colophon {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
}

/* ---------- Archive ---------- */

.archive-head {
  padding: clamp(60px, 10vh, 100px) 0 32px;
}
.archive-head h1 {
  font-size: clamp(32px, 4vw, 42px);
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0 0 12px;
}
.archive-head .lede {
  font-size: 15px;
  color: var(--ink-dim);
  max-width: 52ch;
  line-height: 1.6;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 6px;
  align-items: center;
  padding: 18px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin: 24px 0 0;
}
.filters .filter-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-right: 10px;
}
.chip {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 5px 10px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink-dim);
  cursor: pointer;
  border-radius: 2px;
  transition: all 140ms ease;
}
.chip:hover { border-color: var(--rule-strong); color: var(--ink); }
.chip.active {
  border-color: var(--accent-soft);
  background: var(--hl);
  color: var(--accent);
}

.search-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--rule);
  padding: 4px 10px;
  border-radius: 2px;
  transition: border-color 140ms ease;
}
.search-wrap:focus-within { border-color: var(--accent-soft); }
.search-wrap input {
  background: transparent;
  border: 0;
  outline: 0;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink);
  width: 180px;
  padding: 4px 0;
}
.search-wrap input::placeholder { color: var(--ink-faint); }
.search-wrap .kbd {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 2px;
}

.year-group {
  padding: 32px 0 8px;
}
.year-group .year {
  font-family: var(--mono);
  font-size: 48px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--ink-faint);
  line-height: 1;
  margin-bottom: 18px;
  font-variant-numeric: tabular-nums;
}

/* ---------- Post reading view ---------- */

.post-header {
  padding: clamp(60px, 10vh, 100px) 0 clamp(40px, 6vh, 64px);
  text-align: center;
  border-bottom: 1px solid var(--rule);
}
.post-header .meta-line {
  margin-bottom: 24px;
  display: inline-flex;
  gap: 16px;
  align-items: center;
}
.post-header .meta-line .dot { color: var(--ink-faint); }
.post-header h1 {
  font-size: clamp(32px, 4vw, 46px);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.12;
  max-width: 20ch;
  margin: 0 auto 20px;
}
.post-header .dek {
  max-width: 54ch;
  margin: 0 auto;
  color: var(--ink-dim);
  font-size: 16.5px;
  line-height: 1.55;
}
.post-header .byline {
  margin-top: 32px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.prose {
  padding: clamp(40px, 6vh, 64px) 0 clamp(40px, 6vh, 80px);
  font-size: 17px;
  line-height: 1.7;
  color: var(--ink);
  position: relative;
}
.prose p { margin: 0 0 calc(var(--rhythm) * 0.85); }
.prose p:first-child::first-letter {
  font-family: var(--serif);
  font-size: 3.2em;
  font-weight: 500;
  float: left;
  line-height: 0.9;
  padding: 6px 10px 0 0;
  color: var(--accent);
}
.prose h2 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: calc(var(--rhythm) * 1.5) 0 calc(var(--rhythm) * 0.6);
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.prose h2 .num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
  font-weight: 400;
}
.prose h3 {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  margin: calc(var(--rhythm) * 1.2) 0 calc(var(--rhythm) * 0.4);
}
.prose blockquote {
  margin: calc(var(--rhythm) * 0.8) 0;
  padding: 0 0 0 22px;
  border-left: 2px solid var(--accent-soft);
  font-style: italic;
  color: var(--ink-dim);
}
.prose a.link { color: var(--ink); }

/* Footnotes */
.prose sup.fn-ref {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--accent);
  cursor: pointer;
  padding: 0 2px;
  vertical-align: super;
  line-height: 0;
  transition: color 140ms ease;
}
.prose sup.fn-ref:hover { color: var(--ink); }

.footnote-popover {
  position: absolute;
  z-index: 50;
  width: 300px;
  padding: 14px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--rule-strong);
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink-dim);
  box-shadow: 0 18px 36px -18px rgba(0,0,0,0.6);
}
.footnote-popover .fn-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  display: block;
}

/* Code block */
.code-block {
  margin: calc(var(--rhythm) * 0.9) 0;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  overflow: hidden;
}
.code-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--rule);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.code-head .expand-btn {
  background: transparent;
  border: 0;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
}
.code-head .expand-btn:hover { color: var(--accent); }
.code-body {
  padding: 14px 18px;
  overflow-x: auto;
  max-height: 180px;
  transition: max-height 260ms ease;
}
.code-body.expanded { max-height: 1200px; }
.code-body pre { margin: 0; color: var(--ink); }
.tok-k { color: #c8a75e; }
.tok-s { color: #9eb98f; }
.tok-c { color: var(--ink-faint); font-style: italic; }
.tok-n { color: #d6c89a; }
.tok-f { color: #c4b999; }

/* Pull quote */
.pullquote {
  font-family: var(--serif);
  font-size: 22px;
  line-height: 1.35;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: calc(var(--rhythm) * 1.2) 0;
  padding: 0 0 0 24px;
  border-left: 3px solid var(--accent);
  font-style: italic;
}

/* Callout */
.callout {
  margin: calc(var(--rhythm) * 0.9) 0;
  border: 1px solid var(--rule);
  padding: 18px 20px;
  background: color-mix(in oklab, var(--bg-elev) 60%, transparent);
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 20px;
}
.callout .c-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 3px;
}
.callout .c-body {
  font-family: var(--serif);
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-dim);
}

/* Post footer & notes */
.post-footer {
  padding: 32px 0 0;
  border-top: 1px solid var(--rule);
  margin-top: calc(var(--rhythm) * 1.5);
}
.notes-list {
  list-style: none;
  padding: 0;
  margin: 0 0 calc(var(--rhythm) * 1.5);
  counter-reset: fn;
}
.notes-list li {
  counter-increment: fn;
  position: relative;
  padding: 8px 0 8px 28px;
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink-dim);
  border-bottom: 1px dotted var(--rule);
}
.notes-list li::before {
  content: counter(fn);
  position: absolute;
  left: 0;
  top: 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent);
}

.post-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  margin-bottom: 40px;
}
.post-nav a {
  display: block;
  background: var(--bg);
  padding: 20px 22px;
  transition: background 160ms ease;
}
.post-nav a:hover { background: var(--bg-elev); }
.post-nav .dir {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}
.post-nav .t {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
}
.post-nav a.next { text-align: right; }

/* ---------- About ---------- */

.about-grid {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 56px;
  padding: clamp(60px, 10vh, 100px) 0;
  align-items: start;
}
.about-portrait {
  aspect-ratio: 3 / 4;
  background:
    repeating-linear-gradient(
      135deg,
      var(--rule) 0 1px,
      transparent 1px 10px
    ),
    var(--bg-elev);
  border: 1px solid var(--rule);
  position: relative;
}
.about-portrait::after {
  content: "[ portrait ]";
  position: absolute;
  bottom: 8px;
  left: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}
.about-body h1 {
  font-size: clamp(28px, 3.4vw, 38px);
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0 0 20px;
  line-height: 1.15;
}
.about-body p {
  font-size: 15.5px;
  line-height: 1.65;
  color: var(--ink-dim);
  margin: 0 0 20px;
  max-width: 60ch;
}
.about-body p strong { color: var(--ink); font-weight: 500; }

.speaking {
  padding: clamp(40px, 6vh, 72px) 0;
  border-top: 1px solid var(--rule);
}
.speaking-list {
  display: grid;
  gap: 0;
}
.talk {
  display: grid;
  grid-template-columns: 90px 1fr auto;
  gap: 24px;
  padding: 18px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
}
.talk .date {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}
.talk .title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
}
.talk .venue {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-dim);
  text-transform: uppercase;
}

/* ---------- Projects ---------- */

.projects-head {
  padding: clamp(60px, 10vh, 100px) 0 32px;
}

.project-row {
  display: grid;
  grid-template-columns: 60px 1fr 200px 80px;
  gap: 24px;
  padding: 26px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
  transition: background 160ms ease;
  position: relative;
}
.project-row::before {
  content: "";
  position: absolute;
  inset: 0 -16px;
  background: var(--hl);
  opacity: 0;
  transition: opacity 160ms ease;
}
.project-row:hover::before { opacity: 1; }
.project-row > * { position: relative; }
.project-row .idx {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  font-variant-numeric: tabular-nums;
}
.project-row .p-name {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.project-row .p-desc {
  font-family: var(--serif);
  font-size: 13.5px;
  color: var(--ink-dim);
  line-height: 1.5;
  max-width: 58ch;
}
.project-row .p-stack {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  text-transform: uppercase;
  line-height: 1.6;
}
.project-row .p-status {
  text-align: right;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.status-live { color: #9eb98f; }
.status-wip { color: var(--accent); }
.status-archive { color: var(--ink-faint); }

/* ---------- Now / Uses ---------- */

.now-head {
  padding: clamp(60px, 10vh, 100px) 0 32px;
}
.now-head .updated {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.now-section {
  padding: 28px 0;
  border-top: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 32px;
  align-items: start;
}
.now-section h3 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 4px 0 0;
}
.now-section .body p {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-dim);
  margin: 0 0 12px;
}
.uses-list {
  margin: 0;
  padding: 0;
  list-style: none;
}
.uses-list li {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 20px;
  padding: 6px 0;
  font-size: 14px;
  color: var(--ink-dim);
}
.uses-list .u-key {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  text-transform: uppercase;
}

/* ---------- Subscribe ---------- */

.subscribe {
  padding: clamp(80px, 14vh, 140px) 0;
  text-align: center;
}
.subscribe .eyebrow { margin-bottom: 20px; }
.subscribe h1 {
  font-size: clamp(32px, 4vw, 44px);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
  max-width: 18ch;
  margin: 0 auto 20px;
}
.subscribe .lede {
  max-width: 52ch;
  margin: 0 auto 40px;
  color: var(--ink-dim);
  font-size: 15.5px;
  line-height: 1.6;
}
.sub-form {
  max-width: 440px;
  margin: 0 auto 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  border: 1px solid var(--rule-strong);
  background: var(--bg-elev);
  transition: border-color 160ms ease;
}
.sub-form:focus-within { border-color: var(--accent); }
.sub-form input {
  background: transparent;
  border: 0;
  outline: 0;
  padding: 14px 16px;
  font-family: var(--serif);
  font-size: 15px;
  color: var(--ink);
}
.sub-form input::placeholder { color: var(--ink-faint); }
.sub-form button {
  background: transparent;
  border: 0;
  border-left: 1px solid var(--rule);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0 22px;
  cursor: pointer;
  transition: background 140ms ease;
}
.sub-form button:hover { background: var(--hl); }

.feed-options {
  margin-top: 64px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
  text-align: left;
}
.feed-opt {
  background: var(--bg);
  padding: 22px 22px 26px;
  transition: background 160ms ease;
}
.feed-opt:hover { background: var(--bg-elev); }
.feed-opt .f-name {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.feed-opt .f-desc {
  font-family: var(--serif);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ink-dim);
  margin-bottom: 14px;
}
.feed-opt .f-url {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  word-break: break-all;
}

/* ---------- Tweaks Panel ---------- */

.tweaks-panel {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--rule-strong);
  z-index: 120;
  box-shadow: 0 24px 48px -16px rgba(0,0,0,0.6);
  display: none;
}
.tweaks-panel.show { display: block; }
.tweaks-panel .tp-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tweaks-panel .tp-title {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
}
.tweaks-panel .tp-close {
  background: transparent;
  border: 0;
  color: var(--ink-faint);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 14px;
}
.tweaks-panel .tp-body {
  padding: 14px;
  display: grid;
  gap: 14px;
}
.tweak-row .tr-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.tweak-row .seg {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
  border: 1px solid var(--rule);
}
.tweak-row .seg button {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--rule);
  padding: 7px 6px;
  color: var(--ink-dim);
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 140ms ease;
}
.tweak-row .seg button:last-child { border-right: 0; }
.tweak-row .seg button:hover { color: var(--ink); }
.tweak-row .seg button.active { background: var(--hl); color: var(--accent); }
.tweak-row .swatches {
  display: flex;
  gap: 8px;
}
.tweak-row .swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: transform 140ms ease;
}
.tweak-row .swatch:hover { transform: scale(1.1); }
.tweak-row .swatch.active {
  box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--ink);
}

/* ---------- Utilities ---------- */

.fade-in { animation: fadeIn 360ms ease both; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.stagger > * { animation: fadeIn 420ms ease both; }
.stagger > *:nth-child(1) { animation-delay: 40ms; }
.stagger > *:nth-child(2) { animation-delay: 80ms; }
.stagger > *:nth-child(3) { animation-delay: 120ms; }
.stagger > *:nth-child(4) { animation-delay: 160ms; }
.stagger > *:nth-child(5) { animation-delay: 200ms; }
.stagger > *:nth-child(6) { animation-delay: 240ms; }

@media (max-width: 720px) {
  .topbar-inner { grid-template-columns: 1fr auto; }
  .nav { display: none; }
  .topic-grid, .feed-options, .post-nav { grid-template-columns: 1fr; }
  .about-grid { grid-template-columns: 1fr; }
  .about-portrait { max-width: 220px; aspect-ratio: 3/4; }
  .project-row { grid-template-columns: 1fr; gap: 6px; }
  .project-row .p-status { text-align: left; }
  .now-section { grid-template-columns: 1fr; gap: 10px; }
  .footer-inner { grid-template-columns: 1fr; gap: 28px; }
  .hero { padding: 60px 0 40px; }
  .search-wrap { margin-left: 0; width: 100%; }
}

/* ============================================================
   Inline diagrams — engineering-notebook schematics
   ============================================================ */

.diagram {
  margin: calc(var(--rhythm) * 1.2) 0;
  border: 1px solid var(--rule);
  background:
    linear-gradient(transparent 31px, var(--rule) 31px, var(--rule) 32px, transparent 32px) 0 0 / 100% 32px,
    linear-gradient(90deg, transparent 31px, var(--rule) 31px, var(--rule) 32px, transparent 32px) 0 0 / 32px 100%,
    color-mix(in oklab, var(--bg-elev) 40%, transparent);
  position: relative;
}
.diagram-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule);
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  position: relative;
  z-index: 1;
}
.diagram-head .d-title {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
}
.diagram-head .d-fig {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
}
.diagram-body {
  padding: 28px 24px 32px;
  position: relative;
}
.diagram-caption {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-dim);
  padding: 0 14px 14px;
  border-top: 1px dashed var(--rule);
  padding-top: 12px;
  margin-top: 4px;
}

/* SVG palette */
.diagram svg .stroke { stroke: var(--rule-strong); fill: none; }
.diagram svg .stroke-accent { stroke: var(--accent); fill: none; }
.diagram svg .fill-bg { fill: var(--bg); }
.diagram svg .fill-elev { fill: var(--bg-elev); }
.diagram svg .fill-ink { fill: var(--ink); }
.diagram svg .fill-dim { fill: var(--ink-dim); }
.diagram svg .fill-faint { fill: var(--ink-faint); }
.diagram svg .fill-accent { fill: var(--accent); }
.diagram svg text {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  fill: var(--ink);
}
.diagram svg text.tiny {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  fill: var(--ink-faint);
}
.diagram svg text.serif {
  font-family: var(--serif);
  font-size: 12px;
  letter-spacing: 0;
  text-transform: none;
  fill: var(--ink);
}
.diagram svg text.label-accent {
  fill: var(--accent);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* Matrix diagram */
.diagram-matrix {
  display: grid;
  grid-template-columns: 120px 1fr 1fr;
  gap: 0;
  border-top: 1px solid var(--rule);
  border-left: 1px solid var(--rule);
  margin: 10px 0 0;
  position: relative;
  z-index: 1;
  background: color-mix(in oklab, var(--bg) 85%, transparent);
}
.diagram-matrix .cell {
  padding: 14px 14px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  min-height: 72px;
}
.diagram-matrix .cell.head {
  background: color-mix(in oklab, var(--bg-elev) 60%, transparent);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  min-height: auto;
  padding: 10px 14px;
}
.diagram-matrix .cell .ax {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.diagram-matrix .cell .bd {
  font-family: var(--serif);
  font-size: 13px;
  line-height: 1.45;
  color: var(--ink);
}
.diagram-matrix .cell .sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-dim);
  margin-top: 4px;
}

/* Legend */
.d-legend {
  display: flex;
  gap: 18px;
  padding: 10px 14px;
  border-top: 1px dashed var(--rule);
  flex-wrap: wrap;
}
.d-legend .li {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-dim);
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}
.d-legend .li .dot {
  width: 8px; height: 8px;
  border: 1px solid var(--rule-strong);
  background: var(--bg);
}
.d-legend .li .dot.accent { background: var(--accent); border-color: var(--accent); }
.d-legend .li .dot.solid { background: var(--ink-dim); border-color: var(--ink-dim); }

/* Little annotation callouts inside SVG */
.diagram svg .tag-rect {
  fill: var(--bg);
  stroke: var(--rule-strong);
}
.diagram svg .anno-line {
  stroke: var(--ink-faint);
  stroke-dasharray: 2 2;
  fill: none;
}

/* Responsive shrink */
@media (max-width: 720px) {
  .diagram-matrix { grid-template-columns: 1fr; }
  .diagram-matrix .cell { border-right: 0; }
  .diagram svg { max-width: 100%; height: auto; }
}

/* ============================================================
   Extensions: monogram, reading progress, related, talk,
   case study, 404, search results, dense-home, more diagrams
   ============================================================ */

/* Monogram */
.monogram {
  display: inline-grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--rule-strong);
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
  background:
    linear-gradient(135deg, transparent 49%, var(--accent) 49%, var(--accent) 51%, transparent 51%) no-repeat 100% 100% / 8px 8px,
    var(--bg-elev);
  flex-shrink: 0;
}
.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Reading progress */
.read-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 60;
  transition: width 80ms linear;
  pointer-events: none;
}
.read-meter {
  position: fixed;
  right: 20px;
  top: 68px;
  padding: 8px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-dim);
  z-index: 30;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 200ms ease, transform 200ms ease;
  pointer-events: none;
}
.read-meter.show { opacity: 1; transform: translateY(0); }
.read-meter .rm-bar {
  display: inline-block;
  width: 80px;
  height: 2px;
  background: var(--rule);
  vertical-align: middle;
  margin: 0 8px;
  position: relative;
}
.read-meter .rm-bar::after {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: var(--p, 0%);
  background: var(--accent);
}

/* Related essays */
.related {
  padding: 36px 0 0;
  margin-top: calc(var(--rhythm) * 1.5);
  border-top: 1px solid var(--rule);
}
.related-head {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 20px;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.related-card {
  background: var(--bg);
  padding: 20px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background 160ms ease;
  min-height: 160px;
}
.related-card:hover { background: var(--bg-elev); }
.related-card .r-topic {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}
.related-card .r-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.25;
  flex: 1;
}
.related-card .r-meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
}

/* Speaking page (/speaking) */
.speaking-page {
  padding: clamp(60px, 10vh, 100px) 0 32px;
}
.talk-card {
  display: grid;
  grid-template-columns: 120px 1fr auto;
  gap: 32px;
  padding: 28px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
  transition: background 160ms ease;
  position: relative;
}
.talk-card::before {
  content: "";
  position: absolute;
  inset: 0 -16px;
  background: var(--hl);
  opacity: 0;
  transition: opacity 160ms ease;
}
.talk-card:hover::before { opacity: 1; }
.talk-card > * { position: relative; }
.talk-card .tc-date {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
}
.talk-card .tc-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}

function useAccent() {

// Hover preview for post links — reads data-preview attrs
function useHoverPreview() {
  const ref = useRef(null);
  const [state, setState] = useState({ show: false, x: 0, y: 0, title: "", excerpt: "", meta: "" });
  useEffect(() => {
    let hideTimer;
    const enter = (e) => {
      const el = e.target.closest("[data-preview-title]");
      if (!el) return;
      clearTimeout(hideTimer);
      const rect = el.getBoundingClientRect();
      const x = Math.min(rect.right + 16, window.innerWidth - 340);
      const y = Math.min(rect.top, window.innerHeight - 160);
      setState({
        show: true,
        x, y,
        title: el.getAttribute("data-preview-title"),
        excerpt: el.getAttribute("data-preview-excerpt") || "",
        meta: el.getAttribute("data-preview-meta") || "",
      });
    };
    const leave = (e) => {
      const el = e.target.closest("[data-preview-title]");
      if (!el) return;
      hideTimer = setTimeout(() => setState(s => ({ ...s, show: false })), 80);
    };
    document.addEventListener("mouseenter", enter, true);
    document.addEventListener("mouseleave", leave, true);
    return () => {
      document.removeEventListener("mouseenter", enter, true);
      document.removeEventListener("mouseleave", leave, true);
      clearTimeout(hideTimer);
    };
  }, []);
  return state;
}

function HoverPreview() {
  const s = useHoverPreview();
  if (!s.title) return null;
  return (
    <div
      className={"hover-preview" + (s.show ? " show" : "")}
      style={{ left: s.x, top: s.y }}
    >
      <div className="title">{s.title}</div>
      <div className="excerpt">{s.excerpt}</div>
      <div className="foot">
        <span>{s.meta}</span>
        <span>→</span>
      </div>
    </div>
  );
}

function FootnoteRef({ n, text, children }) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  const [pos, setPos] = useState({ x: 0, y: 0 });

  const onClick = (e) => {
    e.preventDefault();
    const rect = ref.current.getBoundingClientRect();
    const x = Math.min(rect.left + window.scrollX, window.scrollX + window.innerWidth - 320);
    const y = rect.bottom + window.scrollY + 6;
    setPos({ x, y });
    setShow(s => !s);
  };

  useEffect(() => {
    if (!show) return;
    const onClickOut = (e) => {
      if (!ref.current?.contains(e.target)) setShow(false);
    };
    document.addEventListener("click", onClickOut);
    return () => document.removeEventListener("click", onClickOut);
  }, [show]);

  return (
    <>
      <sup
        ref={ref}
        className="fn-ref"
        onClick={onClick}
      >[{n}]</sup>
      {show && ReactDOM.createPortal(
        <div className="footnote-popover fade-in" style={{ left: pos.x, top: pos.y }}>
          <span className="fn-num">Note {n}</span>
          {text}
        </div>,
        document.body
      )}
    </>
  );
}

function RealCostOfBadDataBody() {
  return (
    <>
      <p>
        Every distributor I've worked with over the last decade shares the same
        quiet anxiety. They know their product data is bad. They cannot quite
        say how bad, or what it's costing them, or who is supposed to fix it.
        So it persists, absorbed as a permanent line-item of friction in
        every workflow the business runs.<FootnoteRef n="1" />
      </p>

      <p>
        The cost is not theoretical. It shows up in quotes that go out with
        wrong weights and lose on freight. In a search bar that can't resolve{" "}
        <em>1/2-inch EMT conduit</em> because the catalog has it spelled six
        ways. In a replatforming project that blows its schedule not because
        the platform is wrong, but because nobody owns the master attribute
        schema.
      </p>

      <h2><span className="num">01</span> A short taxonomy of data rot</h2>

      <p>
        There are four recurring shapes of bad product data in distribution,
        and they compound in order:
      </p>

      <ShapesMatrix />

      <p>
        Each corner of the matrix is a different failure mode with a different
        remedy:
      </p>

      <div className="callout">
        <div className="c-label">Shape A<br/>Missing</div>
        <div className="c-body">
          Required attributes absent or null. The most common failure mode, and
          the easiest to detect — but rarely the most expensive.
        </div>
      </div>

      <div className="callout">
        <div className="c-label">Shape B<br/>Wrong</div>
        <div className="c-body">
          Attributes present but incorrect. Freight class, HTS code, pack
          quantity. These silently corrupt downstream calculations and don't
          surface until a customer calls.
        </div>
      </div>

      <div className="callout">
        <div className="c-label">Shape C<br/>Inconsistent</div>
        <div className="c-body">
          Present and correct, but expressed differently across suppliers:
          "1/2 in" vs. "0.5 inch" vs. "12.7 mm." Breaks search, filtering,
          and any analytics that assumes a canonical form.
        </div>
      </div>

      <div className="callout">
        <div className="c-label">Shape D<br/>Untyped</div>
        <div className="c-body">
          Present but schema-less — attributes dropped into free-text
          descriptions because there is nowhere else to put them. Invisible
          to every system that isn't a human.
        </div>
      </div>

      <p>
        Most distribution companies spend the bulk of their data-quality
        budget on Shape A. This is the wrong place to start. Shape A is
        detectable by a <code>NOT NULL</code> constraint. Shape D is what
        silently eats your commerce roadmap.<FootnoteRef n="2" />
      </p>

      <h2><span className="num">02</span> Why it persists</h2>

      <p>
        The honest answer is that product data ownership is a structural
        problem, not a tooling problem. Every department in a distributor
        depends on the catalog, but none of them own it.
      </p>

      <OwnershipDiagram />

      <p>
        The result: a catalog that is everybody's problem and nobody's
        product. Bad data is the emergent property of that arrangement, not
        an accident.
      </p>

      <div className="pullquote">
        Every replatforming project I've shipped that treated the catalog as a
        downstream concern has overrun its budget. The one where I rewrote
        the catalog first went measurably better.<FootnoteRef n="3" />
      </div>

      <h2><span className="num">03</span> A pipeline that actually works</h2>

      <p>
        The pattern I reach for now is boring on purpose. Ingest supplier
        feeds into a staging table with minimal transformation. Normalize in
        a second pass, with every normalization rule versioned. Reconcile
        against a canonical attribute schema. Publish.
      </p>

      <PipelineDiagram />

      <CodeBlock lang="SQL" label="catalog-pipeline.sql — normalization pass">
{`-- stage_01: raw ingest, no transforms
create table catalog.stage_supplier (
  supplier_id  text        not null,
  sku          text        not null,
  payload      jsonb       not null,
  received_at  timestamptz not null default now(),
  primary key (supplier_id, sku, received_at)
);

-- stage_02: normalized into canonical shape
create table catalog.canonical_item (
  item_id          uuid        primary key,
  mfr_part_number  text        not null,
  unspsc_8         text        check (length(unspsc_8) = 8),
  uom              text        not null references catalog.uom(code),
  attributes       jsonb       not null,
  attribute_schema text        not null,  -- versioned
  sourced_from     text[]      not null,
  confidence       numeric(3,2),          -- 0.00 .. 1.00
  updated_at       timestamptz not null default now()
);

-- every normalization is auditable
create table catalog.normalization_event (
  event_id     bigint generated always as identity primary key,
  item_id      uuid references catalog.canonical_item,
  rule_name    text not null,
  rule_version text not null,
  before       jsonb,
  after        jsonb,
  applied_at   timestamptz not null default now()
);`}
      </CodeBlock>

      <p>
        Three design choices do most of the work. <strong>Audit trails on
        every rule application</strong> so you can answer "why did this item
        change" in production. <strong>Versioned attribute schemas</strong>{" "}
        so retroactive changes don't silently invalidate downstream
        contracts. And a <strong>confidence score</strong> on every canonical
        record so systems that consume the catalog can make their own
        decisions about trust.
      </p>

      <h2><span className="num">04</span> The real cost</h2>

      <p>
        So: what does it actually cost? In ten years of engagements, I've
        seen the same rough breakdown:
      </p>

      <ul>
        <li><strong>~1.5% of revenue</strong> in quote errors, freight miscalculations, and reactive returns.</li>
        <li><strong>~3–6 months</strong> added to a typical replatforming project when catalog work is treated as a late-stage concern.</li>
        <li><strong>20–40% of a customer service team's time</strong> spent resolving questions that a better catalog would have answered in the UI.</li>
      </ul>

      <p>
        None of these show up as a line item on any budget. That's the
        problem. The cost is real, it is measurable, and it is structurally
        invisible — which is exactly why fixing it quietly returns more than
        most of the initiatives that do appear on the budget.
      </p>

      <p>
        Start there. Write down your attribute schema. Version it. Make
        somebody responsible for it. The rest is implementation detail.
      </p>
    </>
  );
}

function GenericBody({ post }) {

  return (
    <>
      <p>
        {post.excerpt} The details of this argument matter more than the
        premise, so bear with me for a few paragraphs while I set up the

      <p>
        Distribution is a business of seams. Every interesting problem in the
        industry lives at the join between two systems — ERP and storefront,
        supplier feed and canonical catalog, rep in the field and desk in
        the back office — and the work of a systems architect is, almost
        always, the work of making those seams honest.<FootnoteRef n="1" />
      </p>

      <h2><span className="num">01</span> The premise</h2>

      <p>
        Most of the failure modes I've watched distributors run into have a
        common cause: a piece of the business that was modeled as a technical
        concern turns out to be a trust concern, or vice versa. The symptoms
        differ. The remedy rhymes.
      </p>

      <div className="pullquote">
        The software you can ship in six months usually isn't the software the
        business needed twelve months ago. That's fine. The point of good
        architecture is to make the gap navigable.
      </div>

      <h2><span className="num">02</span> What to do instead</h2>

      <p>
        What follows is a small number of concrete patterns I reach for when
        a client describes the problem in the shape above. None of them are
        novel — that's deliberate. Novelty in B2B systems architecture is
        almost always a signal that you've misunderstood the domain.
      </p>

      <CodeBlock lang="TypeScript" label="example — intent extraction">
{`// Intent extraction from RFQ line-items.
// The hard part is not the LLM. It's the schema you extract into.
type LineItemIntent = {
  kind: "exact" | "equivalent" | "category";
  query: string;
  uom_hint?: string;
  quantity: number;
  uom: string;
  qualifiers: string[];    // "red", "stainless", "NEMA 4X"
  confidence: number;      // 0..1
};

async function extractIntent(
  raw: string
): Promise<LineItemIntent[]> {
  const normalized = normalize(raw);
  const candidates = await llm.complete({
    system: SYSTEM_PROMPT,
    user: normalized,
    schema: LineItemIntentArray,
  });
  return candidates.filter(c => c.confidence > 0.55);
}`}
      </CodeBlock>

      <p>
        The rest of the essay unpacks three specific cases from engagements in
        the last eighteen months. Names and SKUs have been changed; the
        architecture has not.
      </p>

      <h2><span className="num">03</span> In closing</h2>

      <p>
        If any of this is useful to you, I'd be glad to hear about it — I
        write these essays partly to think in public and partly to find the
        other people thinking about the same problems. The contact address
        is on the About page.
      </p>
    </>
  );
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  const parts = text.split(re);
  return parts.map((p, i) => re.test(p) ? <mark key={i}>{p}</mark> : p);
}

function SearchOverlay({ show, onClose }) {
  const [q, setQ] = useState("");
  const inputRef = useRef(null);
  useEffect(() => {
    if (show) setTimeout(() => inputRef.current?.focus(), 60);
  }, [show]);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
    };
    if (show) window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [show, onClose]);

  const results = useMemo(() => {
    if (!q.trim()) return [];
    const lq = q.toLowerCase();
    const out = [];
    window.SITE_DATA.posts.forEach(p => {
      if ((p.title + " " + p.excerpt + " " + p.topic).toLowerCase().includes(lq))
        out.push({ kind: "Essay", title: p.title, excerpt: p.excerpt, href: "#/post/" + p.slug });
    });
    window.SITE_DATA.talks.forEach(t => {
      if ((t.title + " " + t.abstract + " " + t.venue).toLowerCase().includes(lq))
        out.push({ kind: "Talk", title: t.title, excerpt: t.abstract, href: "#/talk/" + t.slug });
    });
    window.SITE_DATA.caseStudies.forEach(c => {
      if ((c.title + " " + c.summary + " " + c.client).toLowerCase().includes(lq))
        out.push({ kind: "Case Study", title: c.title, excerpt: c.summary, href: "#/case/" + c.slug });
    });
    return out;
  }, [q]);

  return (
    <div className={"search-overlay" + (show ? " show" : "")}>
      <div className="search-overlay-inner">
        <div className="search-head">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" style={{color: "var(--ink-faint)"}}>
            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            placeholder="Search essays, talks, and case studies…"
          />
          <button className="close-btn" onClick={onClose}>Esc</button>
        </div>
        <div className="search-meta">
          <span>{q.trim() ? results.length + " matches" : "start typing"}</span>
          <span>scope · all content</span>
        </div>
        {q.trim() && results.length === 0 && (
          <div style={{padding: "40px 0", textAlign: "center", fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.1em", color: "var(--ink-faint)", textTransform: "uppercase"}}>
            no matches — try fewer words
          </div>
        )}
        {results.map((r, i) => (
          <a key={i} href={r.href} className="result-row" onClick={onClose}>
            <div className="r-kind">{r.kind}</div>
            <div className="r-t">{highlight(r.title, q)}</div>
            <div className="r-x">{highlight(r.excerpt, q)}</div>
          </a>
        ))}
        <div className="hint-bar">
          <span><span className="kbd">↵</span>open</span>
          <span><span className="kbd">Esc</span>close</span>
          <span><span className="kbd">⌘K</span>toggle</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useTheme();
  const [density, setDensity] = useDensity();
  const [accent, setAccent] = useAccent();
  const [typography, setTypography] = useState(() => localStorage.getItem("jc-typo") || "spectral");
  const [homeVariant, setHomeVariant] = useState(() => localStorage.getItem("jc-home") || "sparse");
  const [route, navigate] = useRoute();
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);

  useEffect(() => { localStorage.setItem("jc-home", homeVariant); }, [homeVariant]);

  // Apply typography
  useEffect(() => {
    const map = {
      spectral: '"Spectral", "Source Serif Pro", Georgia, serif',
      eb: '"EB Garamond", Georgia, serif',
      fraunces: '"Fraunces", Georgia, serif',
    };
    document.documentElement.style.setProperty("--serif", map[typography] || map.spectral);
    localStorage.setItem("jc-typo", typography);
  }, [typography]);

  // Cmd/Ctrl+K to open search
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setSearchOpen(v => !v);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // Tweaks bridge
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // Route rendering
  let screenLabel = "home";
  let page;
  if (route === "home") {
    page = homeVariant === "dense" ? <DenseHome /> : <Home />;
    screenLabel = "01 Home";
  }
  else if (route === "writing") { page = <Archive />; screenLabel = "02 Archive"; }
  else if (route === "about") { page = <About />; screenLabel = "04 About"; }
  else if (route === "speaking") { page = <SpeakingIndex />; screenLabel = "08 Speaking"; }
  else if (route === "projects") { page = <Projects />; screenLabel = "05 Projects"; }
  else if (route === "now") { page = <Now />; screenLabel = "06 Now"; }
  else if (route === "subscribe") { page = <Subscribe />; screenLabel = "07 Subscribe"; }
  else if (route.startsWith("post/")) {
    const slug = route.slice(5);
    page = <PostView slug={slug} />;
    screenLabel = "03 Post — " + slug;
  } else if (route.startsWith("talk/")) {
    const slug = route.slice(5);
    page = <TalkDetail slug={slug} />;
    screenLabel = "09 Talk — " + slug;
  } else if (route.startsWith("case/")) {
    const slug = route.slice(5);
    page = <CaseStudyDetail slug={slug} />;
    screenLabel = "10 Case — " + slug;
  } else {
    page = <NotFound />;
    screenLabel = "11 Not Found";
  }

  return (
    <>
      <TopBar
        route={route}
        theme={theme}
        onToggleTheme={() => setTheme(theme === "dark" ? "light" : "dark")}
        onOpenSearch={() => setSearchOpen(true)}
      />
      <main data-screen-label={screenLabel} key={route}>
        {page}
      </main>
      <Footer />
      <HoverPreview />
      <SearchOverlay show={searchOpen} onClose={() => setSearchOpen(false)} />
      <TweaksPanel
        show={tweaksOpen}
        onClose={() => setTweaksOpen(false)}
        theme={theme} setTheme={setTheme}
        density={density} setDensity={setDensity}
        accent={accent} setAccent={setAccent}
        typography={typography} setTypography={setTypography}
        homeVariant={homeVariant} setHomeVariant={setHomeVariant}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
